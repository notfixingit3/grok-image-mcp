name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run unit tests
        run: go test -v ./...

      - name: Run protocol tests
        run: ./scripts/test_protocol.sh

      - name: Run mock integration tests
        run: ./scripts/test_mock.sh

      - name: Run gosec security scan
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.2
          gosec -fmt=text ./...